patterns:
  - id: py-fastapi-async-session-leak
    title: Async SQLAlchemy session leak on exception path
    language: Python
    frameworks:
      - fastapi
      - sqlalchemy
    bug_type: resource_leak
    severity_hint: high
    symptoms:
      - Database connection pool exhaustion under load
      - Timeout errors on concurrent requests
      - Unclosed session warnings in logs
    root_cause: Async SQLAlchemy session created with async with or get_session() but not properly closed in exception paths (missing finally block or context manager)
    trigger_conditions:
      - description: Async function that creates a database session without try-finally
        code_signals:
          - "async def"
          - "session"
          - "finally"
      - description: Route handler with inline session usage
        code_signals:
          - "@router"
          - "session"
          - "query("
    bad_code_signals:
      - "session"
      - "query("
      - "execute("
      - "await"
      - "AsyncSession"
    fix_patterns:
      - "Wrap session usage in try-finally or use async context manager"
      - "Ensure session.close() or session.aclose() is called in finally block"
      - "Use dependency injection with yield for session lifecycle"
    evidence:
      - repo: fastapi/fastapi
        issue: 163
        pr: 164
        url: https://github.com/fastapi/fastapi/issues/163
        strength: high
      - repo: sqlalchemy/sqlalchemy
        issue: 8911
        url: https://github.com/sqlalchemy/sqlalchemy/issues/8911
        strength: medium
    confidence: 0.75
    false_positive_boundary: "Only applies to async database sessions. Sync sessions handled by garbage collection may false-positive. Does NOT apply to read-only transactions or connection pools with automatic return."

  - id: py-fastapi-cors-wildcard
    title: CORS middleware configured with wildcard origin allowing credentials
    language: Python
    frameworks:
      - fastapi
    bug_type: misconfiguration
    severity_hint: high
    symptoms:
      - Browser blocks credentialed requests with wildcard CORS
      - Security audit flags permissive CORS policy
      - Credentials leak risk on shared origins
    root_cause: CORSMiddleware configured with allow_origins=["*"] and allow_credentials=True, which is invalid per CORS spec and potentially insecure
    trigger_conditions:
      - description: CORSMiddleware with wildcard and credentials
        code_signals:
          - "CORSMiddleware"
          - "allow_origins"
          - "*"
          - "allow_credentials"
      - description: CORS configuration with permissive settings
        code_signals:
          - "add_middleware"
          - "CORS"
    bad_code_signals:
      - "allow_origins"
      - "'*'"
      - '"*"'
      - "allow_credentials=True"
    fix_patterns:
      - "Replace allow_origins=['*'] with explicit allowed origins list"
      - "Set allow_credentials=False when using wildcard origin"
      - "Use CORSMiddleware allow_origin_regex for dynamic subdomain matching"
    evidence:
      - repo: fastapi/fastapi
        issue: 248
        url: https://github.com/fastapi/fastapi/issues/248
        strength: medium
    confidence: 0.8
    false_positive_boundary: "Does not apply to public APIs that intentionally allow all origins without credentials. Valid when allow_origins=['*'] is used without allow_credentials."

  - id: py-fastapi-sync-in-async
    title: Blocking synchronous I/O call in async route handler
    language: Python
    frameworks:
      - fastapi
    bug_type: performance
    severity_hint: medium
    symptoms:
      - Route handler blocks the event loop under concurrency
      - High latency under load
      - Starlette/FastAPI async endpoint with sync library calls
    root_cause: Calling synchronous blocking I/O (requests, time.sleep, sync DB drivers) directly in an async route handler, blocking the async event loop
    trigger_conditions:
      - description: Async route handler with sync blocking calls
        code_signals:
          - "async def"
          - "@router"
          - "@app"
          - "time.sleep"
      - description: Async function using sync HTTP library
        code_signals:
          - "async def"
          - "requests."
          - "httpx"
    bad_code_signals:
      - "time.sleep"
      - "requests."
      - "open("
      - "read("
      - ".read()"
      - "psycopg2"
      - "sqlite3"
    fix_patterns:
      - "Replace requests with httpx.AsyncClient"
      - "Replace time.sleep with asyncio.sleep"
      - "Run sync code in thread pool via asyncio.to_thread or run_in_executor"
    evidence:
      - repo: fastapi/fastapi
        issue: 218
        url: https://github.com/fastapi/fastapi/issues/218
        strength: medium
    confidence: 0.7
    false_positive_boundary: "Does not apply to non-blocking calls or CPU-bound tasks run in executor. False positives on fast sync calls that complete in <1ms."

  - id: ts-express-error-handling-missing
    title: Express async route handler without error wrapper
    language: TypeScript
    frameworks:
      - express
    bug_type: unhandled_rejection
    severity_hint: high
    symptoms:
      - Unhandled promise rejection on async route errors
      - Express process crash on async error
      - Missing error middleware catches async rejections
    root_cause: Express 4 does not catch promise rejections from async route handlers. Async errors result in unhandled rejections unless wrapped in try-catch or a wrapper middleware
    trigger_conditions:
      - description: Async route handler without try-catch or wrapper
        code_signals:
          - "async"
          - "router."
          - "app."
          - "catch"
      - description: Async handler with no error handling
        code_signals:
          - "async (req"
          - "=>"
          - "await"
    bad_code_signals:
      - "async"
      - "req, res"
      - "router.get"
      - "router.post"
      - "app.get"
      - "app.post"
      - "await"
    fix_patterns:
      - "Wrap handler with express-async-errors or use a higher-order error wrapper"
      - "Add try-catch inside async handler with next(error)"
      - "Migrate to Express 5 which handles async errors natively"
    evidence:
      - repo: expressjs/express
        issue: 5028
        url: https://github.com/expressjs/express/issues/5028
        strength: high
      - repo: expressjs/express
        issue: 3379
        url: https://github.com/expressjs/express/issues/3379
        strength: medium
    confidence: 0.7
    false_positive_boundary: "Does not apply to Express 5 routes (native async error handling). False positive if handler explicitly wraps in try-catch with next()."

  - id: ts-express-auth-bypass-path
    title: Authentication middleware path pattern misconfiguration
    language: TypeScript
    frameworks:
      - express
    bug_type: auth_bypass
    severity_hint: critical
    symptoms:
      - Unauthenticated access to protected routes
      - Auth middleware mounted after unprotected routes
      - Path pattern mismatch allowing access to admin endpoints
    root_cause: Authentication middleware applied with incorrect path pattern or mounted after routes that should be protected, allowing unauthenticated access
    trigger_conditions:
      - description: Auth middleware with potentially incorrect path filtering
        code_signals:
          - "app.use"
          - "auth"
          - "authenticate"
          - "unless"
      - description: Route definition without auth middleware
        code_signals:
          - "router."
          - "admin"
          - "protected"
          - "auth"
    bad_code_signals:
      - "app.use"
      - "unless"
      - ".unless"
      - "skip"
      - "exclude"
      - "auth"
    fix_patterns:
      - "Apply auth middleware globally and use explicit path exclusions"
      - "Ensure auth middleware is mounted before all protected routes"
      - "Use per-route middleware instead of global unless patterns"
    evidence:
      - repo: expressjs/express
        issue: 4627
        url: https://github.com/expressjs/express/issues/4627
        strength: medium
    confidence: 0.6
    false_positive_boundary: "Pattern may false-positive on correctly configured unless() exclusions. Manual review of excluded paths required."
