name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test py${{ matrix.python-version }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Unit tests
        run: uv run pytest tests/ -q

      - name: Validate built-in packs
        run: uv run python skills/detectoracle/scripts/detectoracle.py validate skills/detectoracle/packs

      - name: Run evals
        run: uv run python skills/detectoracle/evals/run_eval.py

      - name: Diagnose
        run: uv run python skills/detectoracle/scripts/detectoracle.py diagnose

      - name: Build DetectorOracle skill bundle
        run: uv run python skills/detectoracle/scripts/build_skill.py

      - name: Verify DetectorOracle skill bundle
        run: uv run python skills/detectoracle/scripts/verify.py
