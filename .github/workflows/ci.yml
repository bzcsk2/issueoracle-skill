name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test py${{ matrix.python-version }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Generate Ruff format diff
        run: |
          uv run ruff format --diff . > ruff-format-diff.patch || true
          test -s ruff-format-diff.patch

      - name: Upload Ruff format diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-format-diff-${{ matrix.python-version }}-${{ matrix.os }}
          path: ruff-format-diff.patch

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Unit tests
        run: uv run pytest tests/ -q

      - name: Validate built-in packs
        run: uv run python skills/issueoracle/scripts/issueoracle.py validate skills/issueoracle/packs

      - name: Run evals
        run: uv run python skills/issueoracle/evals/run_eval.py

      - name: Diagnose
        run: uv run python skills/issueoracle/scripts/issueoracle.py diagnose

      - name: Build DetectorOracle skill bundle
        run: uv run python skills/issueoracle/scripts/build_skill.py

      - name: Verify DetectorOracle skill bundle
        run: uv run python skills/issueoracle/scripts/verify.py
