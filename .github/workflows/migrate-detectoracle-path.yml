name: One-shot DetectorOracle path migration

on:
  push:
    branches:
      - codex/detectoracle-path-migration

permissions:
  contents: write

jobs:
  migrate:
    if: github.ref_name == 'codex/detectoracle-path-migration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/detectoracle-path-migration

      - uses: astral-sh/setup-uv@v5

      - name: Move skill directory and update references
        run: |
          set -euxo pipefail

          if [ -d skills/issueoracle ] && [ ! -d skills/detectoracle ]; then
            git mv skills/issueoracle skills/detectoracle
          fi

          python - <<'PY'
          from pathlib import Path

          skip_dirs = {".git", ".venv", "dist", "__pycache__", ".pytest_cache", ".ruff_cache"}
          replacements = {
              "skills/issueoracle": "skills/detectoracle",
              "skills\\issueoracle": "skills\\detectoracle",
          }

          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              if any(part in skip_dirs for part in path.parts):
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              new_text = text
              for old, new in replacements.items():
                  new_text = new_text.replace(old, new)
              if new_text != text:
                  path.write_text(new_text, encoding="utf-8")
          PY

          rm -f .github/workflows/migrate-detectoracle-path.yml
          uv run ruff format .

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "refactor: migrate skill directory to detectoracle"
            git push
          fi
